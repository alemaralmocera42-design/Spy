<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>okeyyy raka?</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
color:#e91e63;
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.yes{
background:#e91e63;
color:white;
}

.no{
background:#555;
color:white;
position:relative;
}

#message{
margin-top:15px;
color:#e91e63;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Gooddd morninggg myyy bbyyy licaaa🥰🥰🥰</h1>

<button class="Good" onclick="goSurprise()"> Good🥰</button> <button class="Bad" onclick="askAgain()" onmouseover="moveButton()">Bad🥺</button>

<p id="message"></p>

</div>

<script>

let count = 0;

function goSurprise(){
window.location.href = "surprise.html";
}

function askAgain(){

const messages = [
"Are you sure? 🥺",
"Really sure?? 😭",
"Think again please 💔",
"I'll keep asking 😆",
"Please say yes ❤️"
];

document.getElementById("message").innerText =
messages[count % messages.length];

count++;

}

function moveButton(){

const button = document.querySelector(".no");

const x = Math.floor(Math.random()*200)-100;
const y = Math.floor(Math.random()*200)-100;

button.style.transform = `translate(${x}px,${y}px)`;

}

</script>

</body>
</html>
